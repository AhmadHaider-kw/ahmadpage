<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — ahmadov.me</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--black:#0a0a0a;--white:#fff;
--gray-100:#1a1a1a;--gray-200:#252525;--gray-300:#333;--gray-400:#555;--gray-500:#888;--gray-600:#aaa;
--teal-400:#2dd4bf;--teal-500:#14b8a6;--teal-600:#0d9488;--teal-700:#0f766e;
--red-400:#f87171;--red-500:#ef4444;
--amber-400:#fbbf24;--amber-500:#f59e0b;
--blue-400:#60a5fa;--blue-500:#3b82f6;
--purple-400:#a78bfa;--purple-500:#8b5cf6;
--pink-400:#f472b6;--pink-500:#ec4899;
--green-400:#4ade80;--green-500:#22c55e;
--bg:var(--black);--bg-card:var(--gray-100);--bg-elevated:var(--gray-200);
--text:var(--white);--text-secondary:var(--gray-500);--text-muted:var(--gray-400);
--accent:var(--teal-500);--accent-glow:rgba(20,184,166,.15);
--font-display:'Fraunces',serif;--font-body:'DM Sans',sans-serif;
--radius:12px;--radius-sm:8px;--radius-lg:16px;
--ease:cubic-bezier(.16,1,.3,1);
--shadow:0 4px 24px rgba(0,0,0,.4);
}
::selection{background:var(--accent);color:var(--black)}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
a{color:var(--accent);text-decoration:none}

/* ═══ ENCRYPTION UTILS ═══ */
/* Using SubtleCrypto for AES-GCM encryption of localStorage data */

/* ═══ LOGIN SCREEN ═══ */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:var(--bg)}
.login-box{width:100%;max-width:380px;text-align:center}
.login-box .logo{font-family:var(--font-display);font-size:2rem;font-weight:600;color:var(--text);margin-bottom:.5rem;letter-spacing:-.02em}
.login-box .subtitle{color:var(--text-secondary);font-size:.875rem;margin-bottom:2.5rem}
.login-box input{width:100%;padding:1rem 1.25rem;background:var(--bg-card);border:1px solid var(--gray-300);border-radius:var(--radius);color:var(--text);font-size:1rem;font-family:var(--font-body);transition:border .3s}
.login-box input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px var(--accent-glow)}
.login-box input::placeholder{color:var(--gray-400)}
.login-btn{width:100%;padding:1rem;margin-top:1rem;background:var(--accent);color:var(--black);border:none;border-radius:var(--radius);font-size:1rem;font-weight:600;font-family:var(--font-body);cursor:pointer;transition:all .3s var(--ease)}
.login-btn:hover{background:var(--teal-400);transform:translateY(-1px);box-shadow:0 8px 24px rgba(20,184,166,.3)}
.login-error{color:var(--red-400);font-size:.85rem;margin-top:1rem;opacity:0;transition:opacity .3s}
.login-error.show{opacity:1}
.login-lockout{color:var(--amber-400);font-size:.85rem;margin-top:.5rem}

/* ═══ MAIN LAYOUT ═══ */
.app{display:none;min-height:100vh}
.app.active{display:flex}
.sidebar{width:260px;background:var(--bg-card);border-right:1px solid var(--gray-300);padding:1.5rem 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform .3s var(--ease)}
.sidebar-header{padding:0 1.5rem 1.5rem;border-bottom:1px solid var(--gray-300)}
.sidebar-header h1{font-family:var(--font-display);font-size:1.25rem;font-weight:600;letter-spacing:-.02em}
.sidebar-header p{font-size:.75rem;color:var(--text-secondary);margin-top:.25rem}
.sidebar-nav{flex:1;overflow-y:auto;padding:1rem 0}
.nav-section{padding:0 1rem;margin-bottom:.5rem}
.nav-section-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);padding:.5rem .75rem}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;margin:2px .5rem;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;font-size:.9rem;color:var(--text-secondary);border:none;background:none;width:calc(100% - 1rem);text-align:left;font-family:var(--font-body)}
.nav-item:hover{background:var(--bg-elevated);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent);font-weight:600}
.nav-item .icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.nav-item .badge{margin-left:auto;background:var(--accent);color:var(--black);font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:10px}
.sidebar-footer{padding:1rem 1.5rem;border-top:1px solid var(--gray-300)}
.sidebar-footer button{background:none;border:none;color:var(--text-muted);font-size:.8rem;cursor:pointer;font-family:var(--font-body);padding:.5rem 0;transition:color .2s}
.sidebar-footer button:hover{color:var(--red-400)}

.main{flex:1;margin-left:260px;padding:2rem 2.5rem;min-height:100vh}
.main-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.main-header h2{font-family:var(--font-display);font-size:1.75rem;font-weight:600;letter-spacing:-.02em}
.main-header-actions{display:flex;gap:.75rem;align-items:center}

/* ═══ CARDS ═══ */
.card{background:var(--bg-card);border:1px solid var(--gray-300);border-radius:var(--radius-lg);padding:1.5rem;transition:border-color .2s}
.card:hover{border-color:var(--gray-400)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.card-title{font-weight:600;font-size:1rem}
.card-subtitle{font-size:.8rem;color:var(--text-secondary)}

/* ═══ PILLAR COLORS ═══ */
.pillar-mind{--pillar:var(--purple-500);--pillar-light:var(--purple-400);--pillar-glow:rgba(139,92,246,.15)}
.pillar-body{--pillar:var(--green-500);--pillar-light:var(--green-400);--pillar-glow:rgba(34,197,94,.15)}
.pillar-soul{--pillar:var(--amber-500);--pillar-light:var(--amber-400);--pillar-glow:rgba(245,158,11,.15)}
.pillar-finance{--pillar:var(--blue-500);--pillar-light:var(--blue-400);--pillar-glow:rgba(59,130,246,.15)}
.pillar-social{--pillar:var(--pink-500);--pillar-light:var(--pink-400);--pillar-glow:rgba(236,72,153,.15)}

.pillar-dot{width:10px;height:10px;border-radius:50%;background:var(--pillar);box-shadow:0 0 8px var(--pillar-glow)}

/* ═══ DASHBOARD GRID ═══ */
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.25rem;margin-bottom:2rem}
.pillar-card{position:relative;overflow:hidden;cursor:pointer}
.pillar-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pillar)}
.pillar-card .pillar-icon{font-size:2rem;margin-bottom:.75rem}
.pillar-card .pillar-name{font-family:var(--font-display);font-size:1.1rem;font-weight:600;margin-bottom:.25rem}
.pillar-card .pillar-score{font-size:2.5rem;font-weight:700;color:var(--pillar);line-height:1;margin:.75rem 0}
.pillar-card .pillar-meta{font-size:.8rem;color:var(--text-secondary)}

/* ═══ SCORE RING ═══ */
.score-ring{width:64px;height:64px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:5}
.score-ring .ring-bg{stroke:var(--gray-300)}
.score-ring .ring-fill{stroke:var(--pillar);stroke-linecap:round;transition:stroke-dashoffset .8s var(--ease)}
.score-ring .ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700}

/* ═══ PROGRESS BAR ═══ */
.progress-bar{height:6px;background:var(--gray-300);border-radius:3px;overflow:hidden;margin-top:.5rem}
.progress-bar .fill{height:100%;border-radius:3px;transition:width .6s var(--ease)}

/* ═══ STATS ROW ═══ */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{text-align:center;padding:1.25rem}
.stat-value{font-size:1.75rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:.75rem;color:var(--text-secondary);margin-top:.25rem;text-transform:uppercase;letter-spacing:.05em}

/* ═══ HABIT TRACKER ═══ */
.habits-list{display:flex;flex-direction:column;gap:.75rem}
.habit-row{display:flex;align-items:center;gap:1rem;padding:.75rem 1rem;background:var(--bg-elevated);border-radius:var(--radius-sm)}
.habit-name{flex:1;font-size:.9rem;font-weight:500}
.habit-streak{font-size:.75rem;color:var(--text-secondary);min-width:60px;text-align:right}
.habit-days{display:flex;gap:4px}
.habit-day{width:28px;height:28px;border-radius:6px;border:1px solid var(--gray-300);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--text-muted);cursor:pointer;transition:all .2s}
.habit-day:hover{border-color:var(--pillar)}
.habit-day.checked{background:var(--pillar);border-color:var(--pillar);color:var(--black)}
.habit-day.today{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}

/* ═══ JOURNAL ═══ */
.journal-entry{margin-bottom:1rem}
.journal-date{font-size:.75rem;color:var(--text-secondary);margin-bottom:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.journal-textarea{width:100%;min-height:120px;padding:1rem;background:var(--bg-elevated);border:1px solid var(--gray-300);border-radius:var(--radius);color:var(--text);font-family:var(--font-body);font-size:.9rem;line-height:1.7;resize:vertical;transition:border-color .3s}
.journal-textarea:focus{border-color:var(--accent);outline:none}
.journal-past{padding:1rem;background:var(--bg-elevated);border-radius:var(--radius-sm);margin-bottom:.75rem}
.journal-past p{font-size:.9rem;line-height:1.7;white-space:pre-wrap}

/* ═══ GOALS ═══ */
.goal-item{padding:1rem;background:var(--bg-elevated);border-radius:var(--radius-sm);margin-bottom:.75rem;border-left:3px solid var(--pillar)}
.goal-item h4{font-size:.9rem;font-weight:600;margin-bottom:.25rem}
.goal-item p{font-size:.8rem;color:var(--text-secondary)}
.goal-actions{display:flex;gap:.5rem;margin-top:.75rem}

/* ═══ REVIEW TEMPLATE ═══ */
.review-section{margin-bottom:1.5rem}
.review-section h4{font-size:.9rem;font-weight:600;margin-bottom:.75rem;color:var(--pillar-light,var(--accent))}
.review-question{margin-bottom:1rem}
.review-question label{display:block;font-size:.85rem;color:var(--text-secondary);margin-bottom:.5rem}
.review-question textarea{width:100%;min-height:80px;padding:.75rem;background:var(--bg-elevated);border:1px solid var(--gray-300);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:.85rem;resize:vertical}
.review-question textarea:focus{border-color:var(--accent);outline:none}
.review-question select,.review-question input[type="number"]{padding:.5rem .75rem;background:var(--bg-elevated);border:1px solid var(--gray-300);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:.85rem}

/* ═══ LINKS SECTION ═══ */
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.75rem}
.link-card{display:flex;align-items:center;gap:.75rem;padding:1rem;background:var(--bg-elevated);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;border:1px solid transparent}
.link-card:hover{border-color:var(--pillar,var(--accent));transform:translateY(-1px)}
.link-card .link-icon{font-size:1.5rem}
.link-card .link-info h4{font-size:.85rem;font-weight:600}
.link-card .link-info p{font-size:.75rem;color:var(--text-secondary)}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.25rem;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;font-family:var(--font-body);border:none;cursor:pointer;transition:all .2s var(--ease)}
.btn-primary{background:var(--accent);color:var(--black)}
.btn-primary:hover{background:var(--teal-400);transform:translateY(-1px)}
.btn-secondary{background:var(--bg-elevated);color:var(--text);border:1px solid var(--gray-300)}
.btn-secondary:hover{border-color:var(--gray-400)}
.btn-danger{background:transparent;color:var(--red-400);border:1px solid var(--red-400)}
.btn-danger:hover{background:rgba(239,68,68,.1)}
.btn-sm{padding:.4rem .75rem;font-size:.75rem}
.btn-icon{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--bg-elevated);border:1px solid var(--gray-300);color:var(--text-secondary);cursor:pointer;transition:all .2s}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}

/* ═══ MODALS ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:2rem}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--gray-300);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding:2rem}
.modal h3{font-family:var(--font-display);font-size:1.25rem;margin-bottom:1.5rem}
.modal label{display:block;font-size:.85rem;color:var(--text-secondary);margin-bottom:.5rem}
.modal input,.modal textarea,.modal select{width:100%;padding:.75rem;background:var(--bg-elevated);border:1px solid var(--gray-300);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:.9rem;margin-bottom:1rem}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent);outline:none}
.modal-actions{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:2px;background:var(--bg-elevated);border-radius:var(--radius-sm);padding:3px;margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:.6rem 1.25rem;border-radius:6px;font-size:.85rem;font-weight:500;color:var(--text-secondary);cursor:pointer;border:none;background:none;font-family:var(--font-body);white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--bg-card);color:var(--text);box-shadow:var(--shadow)}

/* ═══ EMPTY STATE ═══ */
.empty-state{text-align:center;padding:3rem;color:var(--text-secondary)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.5}
.empty-state p{font-size:.9rem;margin-bottom:1.5rem}

/* ═══ MOBILE NAV ═══ */
.mobile-nav-toggle{display:none;position:fixed;bottom:1.5rem;right:1.5rem;width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--black);border:none;font-size:1.5rem;cursor:pointer;z-index:100;box-shadow:0 4px 16px rgba(20,184,166,.4)}
.sidebar-close{display:none;position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text-secondary);font-size:1.25rem;cursor:pointer}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-card);border:1px solid var(--gray-300);padding:.75rem 1.5rem;border-radius:var(--radius);font-size:.85rem;z-index:300;transition:transform .3s var(--ease);box-shadow:var(--shadow)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green-500)}
.toast.error{border-color:var(--red-500)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-close{display:block}
  .mobile-nav-toggle{display:flex;align-items:center;justify-content:center}
  .main{margin-left:0;padding:1.5rem}
  .dashboard-grid{grid-template-columns:1fr}
  .habit-days{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div id="loginScreen" class="login-screen">

<!-- ═══════════ MAIN APP ═══════════ -->
<div id="app" class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close" id="sidebarClose">✕</button>
    <div class="sidebar-header">
      <h1>Command Center</h1>

    </div>

      <div class="nav-section">

<script>
/* ═══════════════════════════════════════
   SECURITY: PASSWORD HASHING & AUTH
   ═══════════════════════════════════════ */
const SALT = 'ahmadov-life-ops-2024';
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 5 * 60 * 1000;

async function hashPassword(pwd) {
  const enc = new TextEncoder();
  const data = enc.encode(pwd + SALT);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Derive AES key from password for encrypting localStorage data
async function deriveKey(pwd) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:enc.encode(SALT), iterations:100000, hash:'SHA-256' },
    keyMaterial,
    { name:'AES-GCM', length:256 },
    false,
    ['encrypt','decrypt']
  );
}

async function encryptData(key, data) {
  const enc = new TextEncoder();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  return { iv:Array.from(iv), data:Array.from(new Uint8Array(encrypted)) };
}

async function decryptData(key, payload) {
  try {
    const iv = new Uint8Array(payload.iv);
    const data = new Uint8Array(payload.data);
    const decrypted = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
    return JSON.parse(new TextDecoder().decode(decrypted));
  } catch(e) { return null; }
}

/* ═══════════════════════════════════════
   STATE MANAGEMENT
   ═══════════════════════════════════════ */
let currentView = 'dashboard';
let aesKey = null;
let STATE = null;

function defaultState() {
  return {
    version: 2,
    createdAt: new Date().toISOString(),
    pillars: {
      mind:    { score:0, habits:[], goals:[], journal:{}, links:[] },
      body:    { score:0, habits:[], goals:[], journal:{}, links:[] },
      soul:    { score:0, habits:[], goals:[], journal:{}, links:[] },
      finance: { score:0, habits:[], goals:[], journal:{}, links:[] },
      social:  { score:0, habits:[], goals:[], journal:{}, links:[] }
    },
    reviews: [],
    quickLinks: [],
    settings: {}
  };
}

async function saveState() {
  if (!aesKey || !STATE) return;
  const encrypted = await encryptData(aesKey, STATE);
  localStorage.setItem('ahmadov_admin_data', JSON.stringify(encrypted));
}

async function loadState() {
  const raw = localStorage.getItem('ahmadov_admin_data');
  if (!raw) { STATE = defaultState(); return; }
  try {
    const payload = JSON.parse(raw);
    const decrypted = await decryptData(aesKey, payload);
    STATE = decrypted || defaultState();
  } catch(e) { STATE = defaultState(); }
}

/* ═══════════════════════════════════════
   LOGIN FLOW
   ═══════════════════════════════════════ */
const loginForm = document.getElementById('loginForm');
const loginError = document.getElementById('loginError');
const lockoutMsg = document.getElementById('lockoutMsg');

function getAttempts() {
  try { return JSON.parse(localStorage.getItem('ahmadov_attempts') || '{"count":0,"lockedUntil":0}'); }
  catch { return { count:0, lockedUntil:0 }; }
}
function setAttempts(a) { localStorage.setItem('ahmadov_attempts', JSON.stringify(a)); }

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  // Check lockout
  const attempts = getAttempts();
  if (Date.now() < attempts.lockedUntil) {
    const mins = Math.ceil((attempts.lockedUntil - Date.now()) / 60000);
    lockoutMsg.textContent = `Locked out. Try again in ${mins} min.`;
    lockoutMsg.style.display = 'block';
    return;
  }
  lockoutMsg.style.display = 'none';

  const pwd = document.getElementById('passwordInput').value;
  if (!pwd) return;

  // Check if SubtleCrypto is available (requires HTTPS or localhost)
  if (!crypto || !crypto.subtle) {
    // Fallback: simple hash-free mode for local file:// access
    const storedPwd = localStorage.getItem('ahmadov_admin_pwd');
    if (!storedPwd) {
      localStorage.setItem('ahmadov_admin_pwd', btoa(pwd + SALT));
      STATE = defaultState();
      await saveStateFallback(pwd);
      setAttempts({ count:0, lockedUntil:0 });
      enterApp();
      return;
    }
    if (btoa(pwd + SALT) === storedPwd) {
      await loadStateFallback(pwd);
      setAttempts({ count:0, lockedUntil:0 });
      enterApp();
    } else {
      handleFailedAttempt(attempts);
    }
    return;
  }

  try {
    const hash = await hashPassword(pwd);
    const storedHash = localStorage.getItem('ahmadov_admin_hash');

    // First time setup — no password stored yet
    if (!storedHash) {
      localStorage.setItem('ahmadov_admin_hash', hash);
      aesKey = await deriveKey(pwd);
      STATE = defaultState();
      await saveState();
      setAttempts({ count:0, lockedUntil:0 });
      enterApp();
      return;
    }

    if (hash === storedHash) {
      aesKey = await deriveKey(pwd);
      await loadState();
      setAttempts({ count:0, lockedUntil:0 });
      enterApp();
    } else {
      handleFailedAttempt(attempts);
    }
  } catch(err) {
    // Crypto failed (e.g. file:// protocol) — fall back to plain storage
    const storedPwd = localStorage.getItem('ahmadov_admin_pwd');
    if (!storedPwd) {
      localStorage.setItem('ahmadov_admin_pwd', btoa(pwd + SALT));
      STATE = defaultState();
      await saveStateFallback(pwd);
      setAttempts({ count:0, lockedUntil:0 });
      enterApp();
      return;
    }
    if (btoa(pwd + SALT) === storedPwd) {
      await loadStateFallback(pwd);
      setAttempts({ count:0, lockedUntil:0 });
      enterApp();
    } else {
      handleFailedAttempt(attempts);
    }
  }
});

function handleFailedAttempt(attempts) {
  attempts.count++;
  if (attempts.count >= MAX_ATTEMPTS) {
    attempts.lockedUntil = Date.now() + LOCKOUT_MS;
    attempts.count = 0;
    lockoutMsg.textContent = 'Too many attempts. Locked for 5 minutes.';
    lockoutMsg.style.display = 'block';
  }
  setAttempts(attempts);
  loginError.classList.add('show');
  document.getElementById('passwordInput').value = '';
  setTimeout(() => loginError.classList.remove('show'), 3000);
}

// Fallback storage (for file:// — no encryption, but obfuscated)
async function saveStateFallback(pwd) {
  if (!STATE) return;
  localStorage.setItem('ahmadov_admin_data_fb', JSON.stringify(STATE));
}
async function loadStateFallback(pwd) {
  const raw = localStorage.getItem('ahmadov_admin_data_fb');
  if (!raw) { STATE = defaultState(); return; }
  try { STATE = JSON.parse(raw) || defaultState(); }
  catch { STATE = defaultState(); }
}

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('active');

}

function logout() {
  aesKey = null;
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';

/* ═══════════════════════════════════════
   UTILITY HELPERS
   ═══════════════════════════════════════ */
function today() { return new Date().toISOString().slice(0,10); }
function weekDates() {
  const d = new Date(); const day = d.getDay();
  const start = new Date(d); start.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return Array.from({length:7}, (_,i) => {
    const dd = new Date(start); dd.setDate(start.getDate()+i);
    return dd.toISOString().slice(0,10);
  });
}
function dayName(dateStr) { return new Date(dateStr+'T12:00:00').toLocaleDateString('en',{weekday:'short'}); }
function formatDate(dateStr) { return new Date(dateStr+'T12:00:00').toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'}); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

    case 'mind': case 'body': case 'soul': case 'finance': case 'social':

   DASHBOARD VIEW

function getPillarScore(name) {
  const p = STATE.pillars[name];
  if (!p.habits.length) return p.score || 0;
  const week = weekDates();
  let total = 0, possible = 0;
  p.habits.forEach(h => {
    week.forEach(d => { possible++; if (h.checked && h.checked[d]) total++; });
  });
  return possible ? Math.round((total/possible)*100) : (p.score||0);
}

function getOverallScore() {
  const pillars = ['mind','body','soul','finance','social'];
  const scores = pillars.map(getPillarScore);
  return Math.round(scores.reduce((a,b)=>a+b,0)/5);
}

function getTotalStreak(name) {
  const p = STATE.pillars[name];
  let streak = 0;
  const d = new Date();
  for (let i=0; i<365; i++) {
    const dateStr = new Date(d.getTime() - i*86400000).toISOString().slice(0,10);
    const allDone = p.habits.length > 0 && p.habits.every(h => h.checked && h.checked[dateStr]);
    if (allDone) streak++; else if (i>0) break;
  }
  return streak;
}

const PILLAR_META = {
  mind:    { icon:'🧠', label:'Mind',    desc:'Learning, reading, focus, creativity' },
  body:    { icon:'💪', label:'Body',    desc:'Fitness, nutrition, sleep, energy' },
  soul:    { icon:'✦',  label:'Soul',    desc:'Spirituality, peace, gratitude, purpose' },
  finance: { icon:'📊', label:'Finance', desc:'Income, savings, investments, goals' },
  social:  { icon:'🤝', label:'Social',  desc:'Relationships, network, community' }
};

function renderDashboard() {
  const overall = getOverallScore();
  const pillarNames = Object.keys(PILLAR_META);
  const todayStr = today();

  let pillarCards = pillarNames.map(name => {
    const m = PILLAR_META[name];
    const score = getPillarScore(name);

    const habits = STATE.pillars[name].habits;
    const todayDone = habits.filter(h => h.checked && h.checked[todayStr]).length;
    return `
    <div class="card pillar-card pillar-${name}" onclick="switchView('${name}')">

    </div>`;
  }).join('');

  // Today's incomplete habits
  let todayHabits = [];
  pillarNames.forEach(name => {
    STATE.pillars[name].habits.forEach(h => {
      if (!h.checked || !h.checked[todayStr]) {
        todayHabits.push({ ...h, pillar:name });

  });

  let todaySection = '';

    todaySection = `
    <div class="card" style="margin-bottom:2rem">

            <span class="habit-name">${h.name}</span>
            <button class="btn btn-sm btn-primary" onclick="quickCheck('${h.pillar}','${h.id}');event.stopPropagation()">Done ✓</button>
          </div>

    </div>`;
  }

  // Recent journal entries
  let recentJournals = [];
  pillarNames.forEach(name => {
    const j = STATE.pillars[name].journal;
    Object.keys(j).sort().reverse().slice(0,2).forEach(date => {
      if (j[date]) recentJournals.push({ date, pillar:name, text:j[date] });
    });
  });
  recentJournals.sort((a,b) => b.date.localeCompare(a.date));

  let journalSection = '';
  if (recentJournals.length > 0) {
    journalSection = `
    <div class="card">
      <div class="card-header"><span class="card-title">📝 Recent Journal</span></div>
      ${recentJournals.slice(0,4).map(j => `
        <div class="journal-past" style="border-left:3px solid var(--pillar)" onclick="switchView('${j.pillar}')">
          <div style="display:flex;gap:.5rem;margin-bottom:.25rem">
            <span class="pillar-dot pillar-${j.pillar}"></span>
            <span style="font-size:.75rem;color:var(--text-secondary)">${PILLAR_META[j.pillar].icon} ${PILLAR_META[j.pillar].label} · ${formatDate(j.date)}</span>
          </div>
          <p style="font-size:.85rem">${j.text.slice(0,150)}${j.text.length>150?'...':''}</p>
        </div>
      `).join('')}
    </div>`;
  }

  return `
  <div class="main-header">
    <div>
      <h2>Dashboard</h2>
      <p style="font-size:.85rem;color:var(--text-secondary)">${formatDate(today())} · Overall: <strong style="color:var(--accent)">${overall}%</strong></p>
    </div>
  </div>
  <div class="stats-row">
    <div class="card stat-card"><div class="stat-value">${overall}%</div><div class="stat-label">Overall Score</div></div>
    <div class="card stat-card"><div class="stat-value">${pillarNames.reduce((a,n)=>a+STATE.pillars[n].habits.length,0)}</div><div class="stat-label">Active Habits</div></div>
    <div class="card stat-card"><div class="stat-value">${pillarNames.reduce((a,n)=>a+STATE.pillars[n].goals.length,0)}</div><div class="stat-label">Active Goals</div></div>
    <div class="card stat-card"><div class="stat-value">${STATE.reviews.length}</div><div class="stat-label">Reviews Done</div></div>
  </div>
  <div class="dashboard-grid">${pillarCards}</div>
  ${todaySection}
  ${journalSection}
  `;
}

function quickCheck(pillar, habitId) {
  const h = STATE.pillars[pillar].habits.find(h => h.id === habitId);
  if (h) {
    if (!h.checked) h.checked = {};
    h.checked[today()] = true;
    saveState();
    toast('✓ Done!');
    renderView();
  }
}

function showPillarTab(tab, btn) {
  document.querySelectorAll('#pillarTabContent > div').forEach(d => d.style.display = 'none');
  document.getElementById('tab-'+tab).style.display = 'block';
  document.querySelectorAll('#pillarTabs .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}

function getHabitStreak(h) {
  let streak = 0;
  const d = new Date();
  for (let i=0; i<365; i++) {
    const dateStr = new Date(d.getTime()-i*86400000).toISOString().slice(0,10);
    if (h.checked && h.checked[dateStr]) streak++; else if(i>0) break;
  }
  return streak;
}

function toggleHabit(pillar, habitId, date) {
  const h = STATE.pillars[pillar].habits.find(h => h.id === habitId);
  if (!h) return;
  if (!h.checked) h.checked = {};
  h.checked[date] = !h.checked[date];
  if (!h.checked[date]) delete h.checked[date];
  saveState();
  renderView();
}

function deleteHabit(pillar, habitId) {
  if (!confirm('Delete this habit?')) return;
  STATE.pillars[pillar].habits = STATE.pillars[pillar].habits.filter(h => h.id !== habitId);
  saveState(); renderView(); toast('Habit deleted');
}

function deleteGoal(pillar, goalId) {
  if (!confirm('Delete this goal?')) return;
  STATE.pillars[pillar].goals = STATE.pillars[pillar].goals.filter(g => g.id !== goalId);
  saveState(); renderView(); toast('Goal deleted');
}

function deleteLink(pillar, linkId) {
  STATE.pillars[pillar].links = STATE.pillars[pillar].links.filter(l => l.id !== linkId);
  saveState(); renderView(); toast('Link removed');
}

let journalTimer = null;
function saveJournal(pillar, text) {
  clearTimeout(journalTimer);
  journalTimer = setTimeout(() => {
    STATE.pillars[pillar].journal[today()] = text;
    saveState();
  }, 500);
}

function updateGoalProgress(pillar, goalId) {
  const g = STATE.pillars[pillar].goals.find(g => g.id === goalId);
  if (!g) return;
  const val = prompt(`Current progress (target: ${g.target} ${g.unit||''})`, g.current||0);
  if (val !== null) {
    g.current = parseFloat(val) || 0;
    saveState(); renderView(); toast('Progress updated');
  }
}

  const goal = {
    id:uid(), title,
    description: document.getElementById('newGoalDesc').value.trim(),
    target: parseFloat(document.getElementById('newGoalTarget').value) || 0,
    unit: document.getElementById('newGoalUnit').value.trim(),
    current: 0
  };
  STATE.pillars[pillar].goals.push(goal);
  saveState(); closeModal({target:document.getElementById('modalOverlay')}); renderView(); toast('Goal added!');
}

function showAddLinkModal(pillar) {
  openModal(`
    <h3>Add Link — ${PILLAR_META[pillar].label}</h3>
    <label>Title</label>
    <input type="text" id="newLinkTitle" placeholder="e.g. Workout plan" autofocus>
    <label>URL</label>
    <input type="url" id="newLinkUrl" placeholder="https://...">
    <label>Icon (emoji, optional)</label>
    <input type="text" id="newLinkIcon" placeholder="🔗" maxlength="4">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal({target:document.getElementById('modalOverlay')})">Cancel</button>
      <button class="btn btn-primary" onclick="addLink('${pillar}')">Add Link</button>
    </div>
  `);
  setTimeout(() => document.getElementById('newLinkTitle')?.focus(), 100);
}

function addLink(pillar) {
  const title = document.getElementById('newLinkTitle').value.trim();
  const url = document.getElementById('newLinkUrl').value.trim();
  if (!title || !url) return;
  if (!STATE.pillars[pillar].links) STATE.pillars[pillar].links = [];
  STATE.pillars[pillar].links.push({
    id:uid(), title, url,
    icon: document.getElementById('newLinkIcon').value.trim() || '🔗'
  });
  saveState(); closeModal({target:document.getElementById('modalOverlay')}); renderView(); toast('Link added!');
}

/* ═══════════════════════════════════════
   WEEKLY REVIEW VIEW
   ═══════════════════════════════════════ */
function renderReview() {
  const pillars = Object.keys(PILLAR_META);

  let reviewSections = pillars.map(name => {
    const m = PILLAR_META[name];
    return `
    <div class="review-section pillar-${name}">
      <h4>${m.icon} ${m.label} — Score: ${getPillarScore(name)}%</h4>
      <div class="review-question">
        <label>What went well this week?</label>
        <textarea id="review-${name}-wins" placeholder="Wins and progress..."></textarea>
      </div>
      <div class="review-question">
        <label>What needs improvement?</label>
        <textarea id="review-${name}-improve" placeholder="Challenges and gaps..."></textarea>
      </div>
      <div class="review-question">
        <label>Score (1-10)</label>
        <input type="number" id="review-${name}-score" min="1" max="10" placeholder="7">
      </div>
    </div>`;
  }).join('');

  // Past reviews
  let pastReviews = STATE.reviews.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5).map(r => `
    <div class="card" style="margin-bottom:.75rem">
      <div class="card-header"><span class="card-title">Week of ${formatDate(r.date)}</span><span class="card-subtitle">Overall: ${r.overallScore}/10</span></div>
      ${Object.keys(r.pillars||{}).map(p => `
        <div style="padding:.25rem 0;font-size:.85rem">
          <strong>${PILLAR_META[p]?.icon||''} ${PILLAR_META[p]?.label||p}:</strong> ${r.pillars[p].score}/10
          ${r.pillars[p].wins ? ` — ${r.pillars[p].wins.slice(0,80)}` : ''}
        </div>
      `).join('')}
      ${r.notes ? `<p style="margin-top:.5rem;font-size:.85rem;color:var(--text-secondary)">${r.notes}</p>` : ''}
    </div>
  `).join('');

  return `
  <div class="main-header">
    <h2>📋 Weekly Review</h2>
    <button class="btn btn-primary" onclick="saveReview()">Save Review</button>
  </div>
  <div class="card" style="margin-bottom:2rem">
    <div class="card-header"><span class="card-title">This Week — ${formatDate(today())}</span></div>
    ${reviewSections}
    <div class="review-section">
      <h4>📝 Overall Notes</h4>
      <div class="review-question">
        <label>Big picture reflections, adjustments, priorities for next week</label>
        <textarea id="review-overall-notes" rows="4" placeholder="What matters most next week..."></textarea>
      </div>
    </div>
  </div>
  ${pastReviews ? `<h3 style="margin-bottom:1rem;font-family:var(--font-display)">Past Reviews</h3>${pastReviews}` : ''}
  `;
}

function saveReview() {
  const pillars = Object.keys(PILLAR_META);
  const review = { id:uid(), date:today(), pillars:{}, notes:'', overallScore:0 };
  let totalScore = 0;
  pillars.forEach(name => {
    const score = parseInt(document.getElementById(`review-${name}-score`)?.value) || 0;
    review.pillars[name] = {
      wins: document.getElementById(`review-${name}-wins`)?.value?.trim() || '',
      improve: document.getElementById(`review-${name}-improve`)?.value?.trim() || '',
      score
    };
    totalScore += score;
  });
  review.overallScore = Math.round(totalScore / pillars.length);
  review.notes = document.getElementById('review-overall-notes')?.value?.trim() || '';
  STATE.reviews.push(review);
  saveState(); renderView(); toast('Review saved!');
}

/* ═══════════════════════════════════════
   QUICK LINKS VIEW
   ═══════════════════════════════════════ */
function renderLinks() {
  let allLinks = [];
  Object.keys(STATE.pillars).forEach(name => {
    (STATE.pillars[name].links||[]).forEach(l => allLinks.push({...l, pillar:name}));
  });
  (STATE.quickLinks||[]).forEach(l => allLinks.push({...l, pillar:'general'}));

  let linksHTML = allLinks.length > 0 ? `
    <div class="links-grid">
      ${allLinks.map(l => `
        <a href="${l.url}" target="_blank" class="link-card ${l.pillar!=='general'?'pillar-'+l.pillar:''}">
          <span class="link-icon">${l.icon||'🔗'}</span>
          <div class="link-info">
            <h4>${l.title}</h4>
            <p>${l.pillar!=='general'?PILLAR_META[l.pillar].label+' · ':''}${l.url.slice(0,35)}</p>
          </div>
        </a>
      `).join('')}
    </div>
  ` : '<div class="empty-state"><div class="empty-icon">🔗</div><p>No links saved yet. Add links from any pillar section.</p></div>';

  return `
  <div class="main-header">
    <h2>🔗 Quick Links</h2>
    <button class="btn btn-primary" onclick="showAddQuickLinkModal()">+ Add Link</button>
  </div>
  <div class="card">${linksHTML}</div>
  `;
}

function showAddQuickLinkModal() {
  openModal(`
    <h3>Add Quick Link</h3>
    <label>Title</label>
    <input type="text" id="qlTitle" placeholder="e.g. Google Drive folder" autofocus>
    <label>URL</label>
    <input type="url" id="qlUrl" placeholder="https://...">
    <label>Icon (emoji)</label>
    <input type="text" id="qlIcon" placeholder="🔗" maxlength="4">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal({target:document.getElementById('modalOverlay')})">Cancel</button>
      <button class="btn btn-primary" onclick="addQuickLink()">Add</button>
    </div>
  `);
}

function addQuickLink() {
  const title = document.getElementById('qlTitle').value.trim();
  const url = document.getElementById('qlUrl').value.trim();
  if (!title || !url) return;
  if (!STATE.quickLinks) STATE.quickLinks = [];
  STATE.quickLinks.push({ id:uid(), title, url, icon: document.getElementById('qlIcon').value.trim()||'🔗' });
  saveState(); closeModal({target:document.getElementById('modalOverlay')}); renderView(); toast('Link added!');
}

/* ═══════════════════════════════════════
   DATA EXPORT / IMPORT
   ═══════════════════════════════════════ */
function exportAllData() {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ahmadov-life-data-${today()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Data exported!');
}

function importDataPrompt() {
  document.getElementById('importFile').click();
}

async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.pillars) {
      STATE = data;
      await saveState();
      renderView();
      toast('Data imported successfully!');
    } else {
      toast('Invalid data format', 'error');
    }
  } catch(err) { toast('Import failed: ' + err.message, 'error'); }
  e.target.value = '';
}

/* ═══════════════════════════════════════
   KEYBOARD SHORTCUTS & EVENTS
   ═══════════════════════════════════════ */
function bindEvents() {
  // Keyboard shortcuts
}

document.addEventListener('keydown', (e) => {
  // ESC to close modal
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('show');
    document.getElementById('sidebar').classList.remove('open');
  }
  // Quick nav: Ctrl+1-5 for pillars
  if (e.ctrlKey && e.key >= '1' && e.key <= '5') {
    e.preventDefault();
    const pillars = ['mind','body','soul','finance','social'];
    switchView(pillars[parseInt(e.key)-1]);
  }
  // Ctrl+0 for dashboard
  if (e.ctrlKey && e.key === '0') { e.preventDefault(); switchView('dashboard'); }
});

// Auto-save session check
window.addEventListener('beforeunload', () => { if(STATE) saveState(); });

// Mobile sidebar close on outside click
document.addEventListener('click', (e) => {
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('mobileNavToggle');
  if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== toggle) {
    sidebar.classList.remove('open');
  }
});
</script>
